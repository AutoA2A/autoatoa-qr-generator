<section class="card">
    <h2 style="margin-bottom:0.75rem;font-size:1.5rem;">在线生成二维码</h2>
    <div style="display:flex;flex-wrap:wrap;gap:1rem;">
        <!-- 输入区 -->
        <div style="flex:1 1 300px;">
            <label for="qr-text" style="display:block;margin-bottom:0.5rem;">输入文本</label>
            <textarea id="qr-text" rows="4" style="width:100%;padding:0.5rem;border:1px solid #e0e0e0;border-radius:var(--btn-radius);"></textarea>

            <label for="qr-size" style="display:block;margin-top:0.75rem;margin-bottom:0.5rem;">尺寸 (px)</label>
            <input type="number" id="qr-size" value="200" min="100" max="600" style="width:100%;padding:0.5rem;border:1px solid #e0e0e0;border-radius:var(--btn-radius);">

            <label for="qr-color" style="display:block;margin-top:0.75rem;margin-bottom:0.5rem;">前景色</label>
            <input type="color" id="qr-color" value="#000000" style="width:100%;height:2rem;border:none;">

            <label for="qr-bgcolor" style="display:block;margin-top:0.75rem;margin-bottom:0.5rem;">背景色</label>
            <input type="color" id="qr-bgcolor" value="#ffffff" style="width:100%;height:2rem;border:none;">

            <label for="qr-correct" style="display:block;margin-top:0.75rem;margin-bottom:0.5rem;">容错率</label>
            <select id="qr-correct" style="width:100%;padding:0.5rem;border:1px solid #e0e0e0;border-radius:var(--btn-radius);">
                <option value="L">L - 低 (7%)</option>
                <option value="M" selected>M - 中 (15%)</option>
                <option value="Q">Q - 较高 (25%)</option>
                <option value="H">H - 高 (30%)</option>
            </select>

            <button id="download-btn" class="btn" style="margin-top:1rem;">下载 PNG</button>
        </div>

        <!-- 预览区 -->
        <div style="flex:0 0 220px;display:flex;align-items:center;justify-content:center;">
            <canvas id="qr-canvas"></canvas>
        </div>
    </div>
</section>
