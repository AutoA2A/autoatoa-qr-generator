            <h1>生成二维码</h1>
            <form id="qrForm">
                <div class="form-group">
                    <label for="qrContent">内容</label>
                    <input type="text" id="qrContent" required placeholder="请输入要生成二维码的链接或文本">
                </div>
                <div class="form-group">
                    <label for="qrColor">颜色</label>
                    <input type="color" id="qrColor" value="#000000">
                </div>
                <div class="form-group">
                    <label for="qrSize">尺寸（像素）</label>
                    <select id="qrSize">
                        <option value="150">150×150</option>
                        <option value="200">200×200</option>
                        <option value="250">250×250</option>
                        <option value="300">300×300</option>
                    </select>
                </div>
                <button type="submit">生成二维码</button>
            </form>
            <div class="qr-container" id="qrContainer"></div>
        </section>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script>
        document.getElementById('qrForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const content = document.getElementById('qrContent').value;
            const color = document.getElementById('qrColor').value;
            const size = document.getElementById('qrSize').value;

            // 生成二维码
            const qrContainer = document.getElementById('qrContainer');
            qrContainer.innerHTML = '';
            const qrCode = new QRCode(qrContainer, {
                text: content,
                width: size,
                height: size,
                colorDark: color,
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            // 保存到历史
            const newItem = {
                id: Date.now(),
                content: content,
                color: color,
                size: size,
                timestamp: Date.now()
            };
            window.APP_DATA.push(newItem);
        });
    </script>
