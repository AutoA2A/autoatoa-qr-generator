<section class="card">
  <h2 style="margin-bottom:0.75rem;font-size:1.5rem;">我的记录</h2>
  <div id="history-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px));gap:1rem;"></div>
</section>
<script>
  var historyKey='qrHistory';
  function loadHistory(){
    var raw=localStorage.getItem(historyKey);
    var arr=raw?JSON.parse(raw):[];
    window.historyRecords=arr;
    var container=document.getElementById('history-grid');
    container.innerHTML='';
    if(arr.length===0){
      container.innerHTML='<section class="card" style="text-align:center;padding:2rem;"><svg width="64" height="64" fill="var(--secondary)" viewBox="0 0 24 24" aria-hidden="true" style="margin-bottom:1rem;"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zM11 7h2v6h-2V7zm0 8h2v2h-2v-2z"/></svg><p style="font-size:1rem;color:#666;">暂无记录，您可以前往生成页添加。</p><a href="generate.html" class="btn" style="margin-top:1rem;">去生成</a></section>';
      return;
    }
    for(var i=0;i<arr.length;i++){
      var rec=arr[i];
      var img=rec.img||'';
      var text=rec.text||'';
      var time=new Date(rec.time).toLocaleString();
      var id=rec.id;
      var media='<article class="card" style="display:flex;flex-wrap:wrap;gap:1rem;">'+
                '<img src="'+img+'" alt="QR code" style="flex:0 0 120px;border-radius:var(--card-radius);">'+
                '<div style="flex:1;display:flex;flex-direction:column;">'+
                '<h3 style="margin:0 0 0.3rem;font-size:1rem;word-break:break-all;">'+text+'</h3>'+
                '<p style="margin:0 0 0.5rem;font-size:0.85rem;color:#666;">'+time+'</p>'+
                '<div style="margin-top:auto;">'+
                '<a href="#" class="btn" style="margin-right:0.5rem;" onclick="downloadRecord(\''+id+'\')">下载</a>'+
                '<a href="#" class="btn" style="margin-right:0.5rem;" onclick="deleteRecord(\''+id+'\')">删除</a>'+
                '<a href="edit.html?id='+id+'" class="btn">编辑</a>'+
                '</div>'+
                '</div>'+
                '</article>';
      container.insertAdjacentHTML('beforeend',media);
    }
  }
  function downloadRecord(id){
    var rec=window.historyRecords.find(function(r){return r.id===id;});
    if(rec && rec.img){
      var a=document.createElement('a');
      a.href=rec.img;
      a.download='qr_'+id+'.png';
      a.click();
    }
  }
  function deleteRecord(id){
    var arr=window.historyRecords.filter(function(r){return r.id!==id;});
    localStorage.setItem(historyKey,JSON.stringify(arr));
    loadHistory();
  }
  window.onload=function(){loadHistory();}
</script>
