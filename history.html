    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const historyList = document.getElementById('historyList');

            if (window.APP_DATA && Array.isArray(window.APP_DATA)) {
                window.APP_DATA.forEach(item => {
                    const historyItem = document.createElement('div');
                    historyItem.className = 'history-item';

                    const date = new Date(item.timestamp).toLocaleDateString();

                    historyItem.innerHTML = `
                        <div class="history-details">
                            <a href="result.html?id=${item.id}">${item.content}</a>
                            <div class="history-date">${date}</div>
                        </div>
                        <a href="result.html?id=${item.id}" class="btn">查看详情</a>
                    `;

                    historyList.appendChild(historyItem);
                });
            } else {
                historyList.innerHTML = '<p>没有找到生成历史。</p>';
            }
        });
    </script>
