        window.getById = window.getById || function(id){
            return (Array.isArray(window.APP_DATA) ? window.APP_DATA : []).find(item=>String(item.id)===String(id))||null;
        };
        document.addEventListener('DOMContentLoaded',function(){
            // 渲染当前设置
            const settings = (window.APP_DATA && window.APP_DATA.settings) || {defaultColor:'#000000',defaultSize:200};
            document.getElementById('defaultColor').value = settings.defaultColor;
            document.getElementById('defaultSize').value = settings.defaultSize;
            document.getElementById('currentSettings').textContent = `颜色: ${settings.defaultColor}，大小: ${settings.defaultSize}px`;
            // 保存表单
            document.getElementById('settingsForm').addEventListener('submit',function(e){
                e.preventDefault();
                const newColor = document.getElementById('defaultColor').value;
                const newSize = parseInt(document.getElementById('defaultSize').value,10);
                // 更新全局数据（实际项目应持久化）
                if(window.APP_DATA && typeof window.APP_DATA === 'object'){
                    window.APP_DATA.settings = {defaultColor:newColor,defaultSize:newSize};
                }
                document.getElementById('currentSettings').textContent = `颜色: ${newColor}，大小: ${newSize}px`;
                alert('设置已保存');
            });
        });
    </script>
