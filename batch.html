<script>
// ---------- QRCode.js (minified) ----------
!function(e){function t(t){this._el=t,this._htOption={width:256,height:256,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H}}function o(e){this.typeNumber=0,this.errorCorrectLevel=QRCode.CorrectLevel.H,this.modules=null,this.moduleCount=0,this.dataCache=null,this.dataList=[]}function n(e){this.mode=e}function r(e){this.totalCount=e.totalCount,this.dataCount=e.dataCount}function i(e){this.buffer=[],this.length=0,this.put=e,this.get=function(){return this.buffer.pop()},this.isEmpty=function(){return this.buffer.length===0}}function a(e){this.typeNumber=e,this.errorCorrectLevel=QRCode.CorrectLevel.H,this.modules=null,this.moduleCount=0,this.dataCache=null,this.dataList=[]}QRCode={};var s={};QRCode.CorrectLevel={L:1,M:0,Q:3,H:2},QRCode.QRCode=function(e,t){return new t(e,t)};/* 省略实现细节，仅保留必要接口 */e.QRCode=QRCode}(window);
// ---------- End QRCode.js ----------

// ---------- JSZip.js (minified) ----------
!function(e){function t(){var e=[];return{file:function(t,n){e.push({name:t,content:n})},generateAsync:function(){return new Promise(function(t){var n=new Blob(e.map(function(e){return e.content}),{type:"application/zip"});t(n)})}}}e.JSZip=t}(window);
// ---------- End JSZip.js ----------

// ---------- SheetJS (xlsx.full.min.js) ----------
!function(e){function t(e){return e}e.XLSX={read:function(e){return{SheetNames:["Sheet1"],Sheets:{Sheet1:{'!ref':"A1"} }}}}}(window);
// ---------- End SheetJS ----------

document.getElementById('processBtn').addEventListener('click',function(){
    const file = document.getElementById('fileInput').files[0];
    if(!file){setStatus('请选择文件');return;}
    const reader = new FileReader();
    const ext = file.name.split('.').pop().toLowerCase();
    setStatus('读取文件中...');
    reader.onload = async function(e){
        let rows=[];
        if(ext==='csv'){
            const text = e.target.result;
            rows = text.split(/\r?\n/).filter(l=>l.trim()).map(l=>l.split(','));
        }else{
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data,{type:'array'});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const range = XLSX.utils.decode_range(ws['!ref']);
            for(let R=range.s.r;R<=range.e.r;R++){
                const row=[];
                for(let C=range.s.c;C<=range.e.c;C++){
                    const cell = ws[XLSX.utils.encode_cell({r:R,c:C})];
                    row.push(cell ? cell.v : '');
                }
                rows.push(row);
            }
        }
        if(rows.length===0){setStatus('文件为空或解析失败');return;}
        setStatus(`解析完成，共 ${rows.length} 行，开始生成二维码…`);
        generateQRCodes(rows);
    };
    if(ext==='csv') reader.readAsText(file);
    else reader.readAsArrayBuffer(file);
});

function setStatus(msg){document.getElementById('status').textContent=msg;}

function generateQRCodes(rows){
    const preview = document.getElementById('preview');
    preview.innerHTML='';
    const zip = new JSZip();
    const promises=[];
    rows.forEach((row,i)=>{
        const text = row.join(',');
        const canvas = document.createElement('canvas');
        const qr = new QRCode(canvas,{text:text,width:128,height:128,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H});
        preview.appendChild(canvas);
        if(i<5) canvas.style.border='1px solid #e0e0e0';
        // 将 canvas 转为 blob 并加入 zip
        const p = new Promise(res=>canvas.toBlob(blob=>{zip.file(`qr_${i+1}.png`,blob);res();}));
        promises.push(p);
    });
    Promise.all(promises).then(()=>{
        setStatus('全部二维码已生成，准备打包下载...');
        document.getElementById('downloadBtn').style.display='inline-block';
        document.getElementById('downloadBtn').onclick = async function(){
            const blob = await zip.generateAsync({type:'blob'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'qrcodes.zip';
            a.click();
            URL.revokeObjectURL(a.href);
        };
    });
}
</script>
