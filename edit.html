<section class="card">
    <h2 style="margin-bottom:0.75rem;font-size:1.5rem;">编辑二维码</h2>
    <form id="editForm">
        <div style="margin-bottom:1rem;">
            <label for="text" style="display:block;margin-bottom:0.25rem;">内容</label>
            <textarea id="text" name="text" rows="3" style="width:100%;padding:0.5rem;border:1px solid #ccc;border-radius:4px;"></textarea>
        </div>
        <div style="margin-bottom:1rem;">
            <label for="size" style="display:block;margin-bottom:0.25rem;">尺寸 (px)</label>
            <input type="number" id="size" name="size" min="100" max="1000" value="200" style="width:100%;padding:0.5rem;border:1px solid #ccc;border-radius:4px;">
        </div>
        <div style="margin-bottom:1rem;">
            <label for="fg" style="display:block;margin-bottom:0.25rem;">前景色</label>
            <input type="color" id="fg" name="fg" value="#000000" style="width:100%;padding:0.5rem;border:1px solid #ccc;border-radius:4px;">
        </div>
        <div style="margin-bottom:1rem;">
            <label for="bg" style="display:block;margin-bottom:0.25rem;">背景色</label>
            <input type="color" id="bg" name="bg" value="#ffffff" style="width:100%;padding:0.5rem;border:1px solid #ccc;border-radius:4px;">
        </div>
        <button type="submit" class="btn">保存并重新生成</button>
    </form>
</section>

<script>
    // 读取 URL 中的 id 参数
    const params = new URLSearchParams(location.search);
    const recordId = params.get('id');

    if (!recordId) {
        alert('未指定要编辑的记录 ID！');
        // 可选择跳转回历史记录页
        location.href = 'history.html';
    } else {
        // 从 localStorage 中读取对应记录
        const stored = localStorage.getItem('qr_records');
        const records = stored ? JSON.parse(stored) : [];

        const record = records.find(r => r.id === recordId);
        if (!record) {
            alert('未找到对应的记录！');
            location.href = 'history.html';
        } else {
            // 填充表单
            document.getElementById('text').value = record.text || '';
            document.getElementById('size').value = record.size || 200;
            document.getElementById('fg').value = record.fg || '#000000';
            document.getElementById('bg').value = record.bg || '#ffffff';
        }
    }

    // 表单提交后更新记录并返回历史记录页
    document.getElementById('editForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const updated = {
            id: recordId,
            text: document.getElementById('text').value,
            size: parseInt(document.getElementById('size').value, 10),
            fg: document.getElementById('fg').value,
            bg: document.getElementById('bg').value,
            timestamp: Date.now()
        };
        const index = records.findIndex(r => r.id === recordId);
        if (index > -1) {
            records[index] = updated;
            localStorage.setItem('qr_records', JSON.stringify(records));
            alert('记录已更新！');
            location.href = 'history.html';
        }
    });
</script>
